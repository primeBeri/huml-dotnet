name: Feature Request
description: Propose an addition or improvement to Huml.Net.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please check whether the behaviour you want
        is part of the [HUML specification](https://huml.io). If it is a spec-level
        concern, consider raising it with the spec authors first.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or missing capability prompted this request?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen, including any API changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried? Why are they insufficient?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
